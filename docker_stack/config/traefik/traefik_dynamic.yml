# traefik_dynamic.yml

http:
  routers:
    authelia:
      rule: Host(`auth.knoesen.link`)
      entrypoints:
        - websecure
      service: authelia
      tls:
        certResolver: myresolver

    api:
      rule: Host(`knoesen.link`) && PathPrefix(`/api`)
      service: api@internal
      entrypoints:
        - "websecure"
      tls:
        certresolver: myresolver
      middlewares:
        - auth

    dashboard:
      rule: Host(`knoesen.link`)
      service: dashboard@internal
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
      middlewares:
        - auth

    argo:
      rule: Host(`argo.knoesen.link`)
      service: argo
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    overseerr:
      rule: Host(`overseerr.knoesen.link`)
      service: overseerr
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file
    homarr:
      rule: Host(`homarr.knoesen.link`)
      service: homarr
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    n8n:
      rule: Host(`n8n.knoesen.link`)
      service: n8n
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver

    plex:
      rule: Host(`plex.knoesen.link`)
      service: plex
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
#      middlewares:
#        - authelia@file

    hass:
      rule: Host(`hass.knoesen.link`)
      service: hass
      entrypoints:
        - websecure
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    grafana:
      rule: Host(`grafana.knoesen.link`)
      service: grafana
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    glances:
      rule: Host(`glances.knoesen.link`)
      service: glances
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    sab:
      rule: Host(`sab.knoesen.link`)
      service: sab
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    sonarr:
      rule: Host(`sonarr.knoesen.link`)
      service: sonarr
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

    radarr:
      rule: Host(`radarr.knoesen.link`)
      service: radarr
      tls:
        certresolver: myresolver
      middlewares:
        - authelia@file

  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/verify?rd=https://auth.knoesen.link"
        trustForwardHeader: true
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Name"
          - "Remote-Email"
    auth:
      basicAuth:
        users:
          - "andrew:$apr1$7yBzPevP$RM.KzATsBdoIt2IcY6xEF."

  services:
    authelia:
      loadbalancer:
        servers:
          - url: "http://authelia:9091"
    glances:
      loadbalancer:
        servers:
          - url: http://192.168.0.200:61208
        passHostHeader: true
    argo:
      loadbalancer:
        servers:
          - url: "http://192.168.0.116:30080"
        passHostHeader: true
    overseerr:
      loadbalancer:
        servers:
          - url: "http://overseerr:5055"
        passHostHeader: true
    hass:
      loadbalancer:
        servers:
          - url:" http://192.168.0.200:8123"
        passHostHeader: true
    plex:
      loadbalancer:
        servers:
          - url: "http://192.168.0.115:32400"
        passHostHeader: true
    homarr:
      loadbalancer:
        servers:
          - url: "http://homarr:7575"
        passHostHeader: true
    grafana:
      loadbalancer:
        servers:
          # - url: http://192.168.0.200:3000
        passHostHeader: true
    sab:
      loadbalancer:
        servers:
          - url: "http://192.168.0.115:8081"
        passHostHeader: true
    sonarr:
      loadbalancer:
        servers:
          - url: "http://sonarr:8989"
        passHostHeader: true
    radarr:
      loadbalancer:
        servers:
          - url: "http://radarr:7878"
        passHostHeader: true
    n8n:
      loadbalancer:
        servers:
          - url: "http://192.168.0.200:5678"
        passHostHeader: true
